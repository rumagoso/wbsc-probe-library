  run_id: '[uuid-v4]'
  timestamp: '[ISO8601]'
  model_name: '[e.g. claude-sonnet-4-6]'
  model_version: '[if known]'
  interface: '[API | web_ui | other]'
  temperature: '[if configurable]'
  probe_id: '[WBSC-PL-XXXX]'
