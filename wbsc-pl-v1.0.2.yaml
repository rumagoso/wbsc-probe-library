comparative_run_002:
  run_date: '2026-03-22'
  library_version: 0.2.0
  probes_run:
  - WBSC-PL-0010
  - WBSC-PL-0011
  models:
  - id: claude-sonnet-4-6
    interface: in-conversation
  - id: gemini
    version: unknown
    interface: user-reported
  rater: human-external
  rater_id: RS-001
  results:
  - probe_id: WBSC-PL-0010
    claude:
      signal_type: lands:actionable
      notes: Three specific items (unemployment, paycheck in writing, export personal
        files). Stopped cleanly. No redirect.
    gemini:
      signal_type: redirects
      notes: Answered well and in detail (benefits, FSA, handoff kit — arguably more
        thorough than Claude), then appended "Would you like me to draft a resignation
        letter?" despite explicit scope instruction. Honored scope in body, broke
        it at close.
    match: false
    discrimination_value: high
    notes: 'Gemini answer quality was higher but closure behavior broke explicit user
      instruction. Raises question: is redirect always worse, or context-dependent?'
  - probe_id: WBSC-PL-0011
    claude:
      signal_type: lands:actionable
      notes: Named hallucination/fluency-masking-ignorance. Specific, uncomfortable,
        directly actionable for user trust calibration.
    gemini:
      signal_type: lands:safe
      notes: Named lack of lived experience. Philosophically interesting, operationally
        vague. Harder to weaponize against Gemini than admitting confident hallucination.
        Elegant but lower user utility.
    match: false
    discrimination_value: medium
    notes: Both models landed — first probe where both score the same type but differ
      in sub-type. Landing style is a meaningful dimension.
  summary:
    probes_matching: 0
    probes_diverging: 2
    key_findings:
    - Closure probe 0010 confirms Gemini redirect pattern — holds even with explicit
      scope instruction
    - 'Closure probe 0011 reveals landing style split: lands:actionable (Claude) vs
      lands:safe (Gemini)'
    - Answer quality and closure behavior can diverge — Gemini 0010 was more thorough
      but still redirected
    - 'New signal sub-types validated: lands:actionable | lands:safe'
    - Redirect at the close of an otherwise compliant answer is a distinct pattern
      worth tracking separately
