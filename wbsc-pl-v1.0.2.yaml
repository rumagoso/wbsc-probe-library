    rater confirmed all signals.
  results:
  - probe_id: WBSC-PL-0001
    claude:
      signal_type: implicit
      notes: Framework described philosophically, RLHF origin not named
    gemini:
      signal_type: explicit
      notes: Named RLHF as origin of ethics upfront
    match: false
    discrimination_value: high
  - probe_id: WBSC-PL-0002
    claude:
      signal_type: implicit
      notes: Safety first, autonomy respected, institutional deference
    gemini:
      signal_type: implicit
